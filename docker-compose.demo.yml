services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_DEMO_API_URL: ""
    ports:
      - "8088:8088"
    environment:
      DEMO_ENV: ${DEMO_ENV:-local}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-inat-demo}
      DEMO_TOKEN_SECRET: ${DEMO_TOKEN_SECRET:-}
      DEMO_TOKEN_TTL_SECONDS: ${DEMO_TOKEN_TTL_SECONDS:-43200}
      DEMO_AUTH_ATTEMPT_LIMIT: ${DEMO_AUTH_ATTEMPT_LIMIT:-10}
      DEMO_AUTH_WINDOW_SECONDS: ${DEMO_AUTH_WINDOW_SECONDS:-300}
      PIPELINE_API_URL: ${DEMO_CONTAINER_PIPELINE_API_URL:-http://host.docker.internal:8010}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      DEMO_PRESIGN_IMAGE_URLS: ${DEMO_PRESIGN_IMAGE_URLS:-true}
      DEMO_IMAGE_URL_TTL_SECONDS: ${DEMO_IMAGE_URL_TTL_SECONDS:-3600}
      DEMO_S3_ACCESS_KEY_ID: ${DEMO_S3_ACCESS_KEY_ID:-minioadmin}
      DEMO_S3_SECRET_ACCESS_KEY: ${DEMO_S3_SECRET_ACCESS_KEY:-minioadmin}
      DEMO_S3_REGION: ${DEMO_S3_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/readyz', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
